services:
  grok-register:
    build:
      context: .
      dockerfile: Dockerfile
    image: grok-register-cpa:local
    container_name: grok-register-cpa
    init: true
    restart: unless-stopped
    ports:
      - "127.0.0.1:18081:18081"
      - "127.0.0.1:18082:6080"
    environment:
      GROK_DOCKER: "1"
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "18081"
    volumes:
      - .:/app
    shm_size: "2gb"
    command: ["web"]
